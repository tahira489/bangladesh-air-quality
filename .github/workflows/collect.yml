name: Bangladesh Air Quality Recorder

on:
  schedule:
    - cron: '0 2 * * *'    # 8:00 AM Bangladesh time
    - cron: '0 10 * * *'   # 4:00 PM Bangladesh time
    - cron: '0 16 * * *'   # 10:00 PM Bangladesh time
  workflow_dispatch:         # lets you run it manually anytime

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install libraries
        run: pip install requests pandas pytz

      - name: Run recorder
        env:
          IQAIR_API_KEY: ${{ secrets.IQAIR_API_KEY }}
        run: python recorder.py

      - name: Save CSV to repository
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dhaka_air_quality.csv
          git commit -m "Daily AQI recording - $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push
